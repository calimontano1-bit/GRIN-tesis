# config/grin/mexflux.yaml
# Configuración GRIN para datos MexFlux
# Dos sensores (RBRL, RBMNN), 23 variables, frecuencia 30 min

# Datos
window: 8          # ventana de 8 pasos = 4 horas
stride: 1

# Entrenamiento
epochs: 12
batch_size: 32
lr: 0.0001
patience: 10

# Optimizador
l2_reg: 0.0
grad_clip_val: 5.0
grad_clip_algorithm: norm

# Modelo GRIN
model_name: grin
d_hidden: 32
d_emb: 0
d_ff: 32
ff_dropout: 0.0
kernel_size: 2
decoder_order: 1
n_layers: 1
layer_norm: false
merge: mlp

# Grafo
adj_threshold: 0.0

# Split
val_len: 0.1
test_len: 0.2

# Misc
in_sample: false
aggregate_by: mean